<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rateio do Vinho</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --burgundy:#6B1E2E;--wine:#8B2635;--rose:#C4727D;
  --gold:#C9A84C;--gold-light:#E8C97A;
  --cream:#F7F0E6;--parchment:#EDE0CC;
  --dark:#1A0A0F;--text:#2C1810;--muted:#7A5C58;
  --shadow:rgba(107,30,46,0.18);
}
body{
  background:var(--dark);color:var(--text);
  font-family:'Cormorant Garamond',serif;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 20% 10%,rgba(139,38,53,.25) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 90%,rgba(107,30,46,.20) 0%,transparent 50%);
  display:flex;align-items:flex-start;justify-content:center;
  padding:2rem 1rem 4rem;
}
.container{width:100%;max-width:780px;}
.header{text-align:center;margin-bottom:2.5rem;}
.header::before,.header::after{
  content:'';display:block;height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:.8rem auto;width:60%;
}
.wine-icon{font-size:2.6rem;display:block;margin-bottom:.4rem;}
.header h1{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--gold-light);letter-spacing:.04em;}
.header p{color:var(--rose);font-size:1.05rem;font-style:italic;letter-spacing:.06em;margin-top:.3rem;}
.card{
  background:linear-gradient(145deg,var(--cream) 0%,var(--parchment) 100%);
  border-radius:12px;padding:2rem 2.2rem;margin-bottom:1.4rem;
  border:1px solid rgba(201,168,76,.35);
  box-shadow:0 4px 24px var(--shadow);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(to right,var(--burgundy),var(--gold),var(--burgundy));
}
.card-title{
  font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;
  color:var(--burgundy);letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:1.4rem;display:flex;align-items:center;gap:.5rem;
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem 1.5rem;}
.form-group{display:flex;flex-direction:column;gap:.35rem;}
label{font-size:.82rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
input[type="text"],input[type="number"]{
  background:rgba(255,255,255,.7);border:1.5px solid rgba(107,30,46,.2);
  border-radius:6px;padding:.6rem .85rem;
  font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--text);
  transition:border-color .2s,box-shadow .2s;width:100%;
}
input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.18);}
input::placeholder{color:#b89f90;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.row-payer{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:.6rem;align-items:center;margin-bottom:.7rem;}
.row-part{display:grid;grid-template-columns:1fr auto;gap:.6rem;align-items:center;margin-bottom:.55rem;}
.icon-wrap{position:relative;}
.icon-wrap input{padding-left:2rem;}
.row-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;}
.btn{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:600;letter-spacing:.05em;border:none;border-radius:6px;cursor:pointer;transition:all .2s;padding:.55rem 1.1rem;}
.btn-add{background:rgba(107,30,46,.1);color:var(--burgundy);border:1.5px solid rgba(107,30,46,.3);}
.btn-add:hover{background:rgba(107,30,46,.18);}
.btn-rm{background:transparent;color:var(--rose);border:1.5px solid rgba(196,114,125,.35);padding:.5rem .75rem;font-size:1rem;}
.btn-rm:hover{background:rgba(196,114,125,.12);}
.btn-primary{
  background:linear-gradient(135deg,var(--burgundy),var(--wine));
  color:var(--gold-light);padding:.85rem 2.5rem;font-size:1.15rem;
  letter-spacing:.08em;border-radius:8px;
  box-shadow:0 4px 16px rgba(107,30,46,.4);width:100%;border:none;cursor:pointer;
}
.btn-primary:hover{box-shadow:0 6px 22px rgba(107,30,46,.55);transform:translateY(-1px);}
.btn-back{background:linear-gradient(135deg,#2C1810,#4a2020);color:var(--gold-light);padding:.85rem 2.5rem;font-size:1.15rem;letter-spacing:.08em;border-radius:8px;width:100%;margin-top:.5rem;border:none;cursor:pointer;}
.btn-print{background:transparent;color:var(--gold);border:1.5px solid var(--gold);padding:.6rem 1.4rem;cursor:pointer;}
.err{background:rgba(196,114,125,.15);border:1px solid rgba(196,114,125,.4);border-radius:6px;padding:.7rem 1rem;color:var(--wine);font-size:.95rem;margin-bottom:1rem;display:none;}
#result{display:none;}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(107,30,46,.2),transparent);margin:1rem 0;}
.totals-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.2rem;}
.total-box{background:rgba(107,30,46,.07);border:1px solid rgba(107,30,46,.15);border-radius:8px;padding:.8rem 1rem;text-align:center;}
.total-box .lbl{font-size:.75rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
.total-box .val{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--burgundy);font-weight:600;margin-top:.2rem;}
.total-box.hl{background:rgba(107,30,46,.13);border-color:rgba(107,30,46,.3);}
.total-box.hl .val{color:var(--wine);}
.payer-result{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:1rem 1.2rem;margin-bottom:.8rem;}
.pr-name{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--burgundy);font-weight:600;margin-bottom:.5rem;}
.pr-detail{font-size:.95rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:.3rem;}
.pr-sub{font-size:.85rem;color:var(--muted);margin-top:.4rem;}
.pay-table{width:100%;border-collapse:collapse;font-size:.97rem;margin-top:.5rem;}
.pay-table th{font-size:.75rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;padding:.5rem .6rem;border-bottom:1.5px solid rgba(107,30,46,.2);text-align:left;}
.pay-table td{padding:.55rem .6rem;border-bottom:1px solid rgba(107,30,46,.08);}
.pay-table tr:last-child td{border-bottom:none;}
.td-name{font-weight:600;color:var(--text);}
.td-amt{color:var(--wine);font-weight:600;font-family:'Playfair Display',serif;}
.td-to{color:var(--muted);font-size:.9rem;}
.check-box{background:rgba(107,30,46,.05);border:1px dashed rgba(107,30,46,.25);border-radius:8px;padding:.9rem 1.1rem;font-size:.95rem;color:var(--muted);}
.ci{display:flex;justify-content:space-between;margin-bottom:.3rem;}
.ct{border-top:1.5px solid rgba(107,30,46,.2);margin-top:.5rem;padding-top:.5rem;font-weight:700;color:var(--burgundy);font-size:1.05rem;display:flex;justify-content:space-between;}
.ok{color:#2d7a4f;font-weight:700;}
@media(max-width:560px){.form-grid{grid-template-columns:1fr;}.row-payer{grid-template-columns:1fr 1fr auto;}.totals-grid{grid-template-columns:1fr;}}
@media print{body{background:white;padding:0;}#input-section{display:none;}.btn-print{display:none;}}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="wine-icon">🍷</span>
    <h1>Rateio do Encontro</h1>
    <p>Divisão elegante entre amigos</p>
  </div>

  <div id="input-section">
    <div class="card">
      <div class="card-title"><span>🧾</span> Despesas do Encontro</div>
      <div class="form-grid">
        <div class="form-group"><label>Data</label><input type="text" id="data" placeholder="ex: Maio 2025"></div>
        <div class="form-group"><label>Local / Tema</label><input type="text" id="local" placeholder="ex: Casa do Júlio"></div>
      </div>
      <div style="margin-top:1.2rem">
        <div class="section-header">
          <label style="margin:0">Quem pagou o quê?</label>
          <button class="btn btn-add" id="btn-add-payer">+ Adicionar</button>
        </div>
        <div id="payers-list"></div>
      </div>
    </div>

```
<div class="card">
  <div class="card-title"><span>👥</span> Participantes (que não pagaram)</div>
  <div class="section-header">
    <label style="margin:0">Quem deve pagar a cota?</label>
    <button class="btn btn-add" id="btn-add-part">+ Adicionar</button>
  </div>
  <div id="parts-list"></div>
</div>

<div class="err" id="err"></div>

```

  </div>

  <div id="result">
    <div class="card">
      <div class="result-header">
        <div class="card-title" style="margin:0"><span>📊</span> Resultado do Rateio</div>
        <button class="btn btn-print" id="btn-print">🖨️ Imprimir</button>
      </div>
      <div id="ev-title" style="color:var(--muted);font-style:italic;margin-bottom:1rem;font-size:.98rem;"></div>
      <div class="totals-grid" id="totals"></div>
      <div class="divider"></div>
      <div class="card-title" style="font-size:.98rem;margin-bottom:.8rem"><span>💰</span> Quem recebe</div>
      <div id="payers-res"></div>
      <div class="divider"></div>
      <div class="card-title" style="font-size:.98rem;margin-bottom:.8rem"><span>💸</span> Quem paga e para quem</div>
      <table class="pay-table"><thead><tr><th>Participante</th><th>Paga para</th><th>Valor</th></tr></thead><tbody id="pay-rows"></tbody></table>
      <div class="divider"></div>
      <div class="card-title" style="font-size:.98rem;margin-bottom:.8rem"><span>✅</span> Conferência</div>
      <div class="check-box" id="check"></div>
    </div>
    <button class="btn-back" id="btn-back">← Novo Encontro</button>
  </div>

</div>

<script>
(function() {
  var payerCount = 0;
  var partCount  = 0;
  var payerIds   = [];
  var partIds    = [];

  function fmt(v) {
    return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  function showErr(msg) {
    var el = document.getElementById('err');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 4000);
  }

  function addPayer(name, item, val) {
    payerCount++;
    var id = payerCount;
    payerIds.push(id);
    var list = document.getElementById('payers-list');
    var div = document.createElement('div');
    div.className = 'row-payer';
    div.id = 'prow-' + id;
    div.innerHTML =
      '<div class="icon-wrap"><span class="row-icon">🧑</span>' +
      '<input type="text" id="pname-' + id + '" placeholder="Nome" value="' + (name || '') + '"></div>' +
      '<input type="text" id="pitem-' + id + '" placeholder="Item (ex: Cartola)" value="' + (item || '') + '">' +
      '<input type="number" id="pval-' + id + '" placeholder="R$ 0,00" min="0" step="0.01" value="' + (val || '') + '">' +
      '<button class="btn btn-rm" data-id="' + id + '" data-type="payer">✕</button>';
    list.appendChild(div);
    div.querySelector('[data-type="payer"]').addEventListener('click', function() {
      removePayer(parseInt(this.getAttribute('data-id')));
    });
  }

  function removePayer(id) {
    if (payerIds.length <= 1) return;
    payerIds = payerIds.filter(function(x) { return x !== id; });
    var el = document.getElementById('prow-' + id);
    if (el) el.parentNode.removeChild(el);
  }

  function addParticipant(name) {
    partCount++;
    var id = partCount;
    partIds.push(id);
    var list = document.getElementById('parts-list');
    var div = document.createElement('div');
    div.className = 'row-part';
    div.id = 'partrow-' + id;
    div.innerHTML =
      '<div class="icon-wrap"><span class="row-icon">🙋</span>' +
      '<input type="text" id="partname-' + id + '" placeholder="Nome do participante" value="' + (name || '') + '"></div>' +
      '<button class="btn btn-rm" data-id="' + id + '" data-type="part">✕</button>';
    list.appendChild(div);
    div.querySelector('[data-type="part"]').addEventListener('click', function() {
      removePart(parseInt(this.getAttribute('data-id')));
    });
  }

  function removePart(id) {
    if (partIds.length <= 1) return;
    partIds = partIds.filter(function(x) { return x !== id; });
    var el = document.getElementById('partrow-' + id);
    if (el) el.parentNode.removeChild(el);
  }

  function calculate() {
    var payers = [];
    for (var i = 0; i < payerIds.length; i++) {
      var id = payerIds[i];
      var name = (document.getElementById('pname-' + id).value || '').trim();
      var item = (document.getElementById('pitem-' + id).value || '').trim();
      var val  = parseFloat(document.getElementById('pval-' + id).value) || 0;
      if (name && val > 0) payers.push({ name: name, item: item, value: val });
    }
    var parts = [];
    for (var j = 0; j < partIds.length; j++) {
      var pid = partIds[j];
      var pname = (document.getElementById('partname-' + pid).value || '').trim();
      if (pname) parts.push({ name: pname });
    }
    if (payers.length === 0) return showErr('Informe ao menos um pagador com valor.');
    if (parts.length === 0)  return showErr('Informe ao menos um participante.');

    var total  = 0;
    for (var k = 0; k < payers.length; k++) total += payers[k].value;
    var nTotal = payers.length + parts.length;
    var share  = total / nTotal;
    var nParts = parts.length;

    for (var p = 0; p < payers.length; p++) {
      payers[p].net = payers[p].value - share;
      payers[p].pp  = payers[p].net / nParts;
    }

    document.getElementById('totals').innerHTML =
      '<div class="total-box"><div class="lbl">Total gasto</div><div class="val">' + fmt(total) + '</div></div>' +
      '<div class="total-box"><div class="lbl">Participantes</div><div class="val">' + nTotal + ' pessoas</div></div>' +
      '<div class="total-box hl"><div class="lbl">Cota por pessoa</div><div class="val">' + fmt(share) + '</div></div>';

    var dt = document.getElementById('data').value || '';
    var lc = document.getElementById('local').value || '';
    document.getElementById('ev-title').textContent = [dt, lc].filter(Boolean).join(' · ');

    var html = '';
    for (var p2 = 0; p2 < payers.length; p2++) {
      var py = payers[p2];
      var det = parts.map(function(pt) { return pt.name + ': ' + fmt(py.pp); }).join(' · ');
      html +=
        '<div class="payer-result">' +
        '<div class="pr-name">🍾 ' + py.name + ' <span style="font-size:.82rem;color:var(--muted);font-weight:400"> — ' + (py.item || 'despesa') + '</span></div>' +
        '<div class="pr-detail">' +
        '<span>Pagou: <strong>' + fmt(py.value) + '</strong></span>' +
        '<span>Cota: <strong>' + fmt(share) + '</strong></span>' +
        '<span style="color:var(--wine)">Líquido: <strong>' + fmt(py.net) + '</strong></span>' +
        '</div>' +
        '<div class="pr-sub">' + fmt(py.net) + ' ÷ ' + nParts + ' = <strong>' + fmt(py.pp) + '</strong> por pessoa · ' + det + '</div>' +
        '</div>';
    }
    document.getElementById('payers-res').innerHTML = html;

    var rows = '';
    for (var q = 0; q < parts.length; q++) {
      var pt = parts[q];
      var totalOwed = 0;
      for (var r = 0; r < payers.length; r++) {
        totalOwed += payers[r].pp;
        rows +=
          '<tr><td class="td-name">' + pt.name + '</td>' +
          '<td class="td-to">→ ' + payers[r].name + ' <span style="font-size:.8rem;color:#aaa">(' + (payers[r].item || 'despesa') + ')</span></td>' +
          '<td class="td-amt">' + fmt(payers[r].pp) + '</td></tr>';
      }
      rows +=
        '<tr style="background:rgba(107,30,46,.05)">' +
        '<td class="td-name" style="color:var(--burgundy)">↳ Total ' + pt.name + '</td>' +
        '<td></td>' +
        '<td class="td-amt" style="color:var(--burgundy)">' + fmt(totalOwed) + '</td></tr>';
    }
    document.getElementById('pay-rows').innerHTML = rows;

    var chk = '';
    var totalRec = 0;
    for (var s = 0; s < payers.length; s++) {
      var received = nParts * payers[s].pp;
      totalRec += received;
      chk += '<div class="ci"><span>' + nParts + ' × ' + fmt(payers[s].pp) + ' (' + (payers[s].item || payers[s].name) + ')</span><span>' + fmt(received) + '</span></div>';
    }
    var totalNets = 0;
    for (var t = 0; t < payers.length; t++) totalNets += payers[t].net;
    chk += '<div class="ct"><span>Total recebido</span><span>' + fmt(totalRec) + '</span></div>';
    chk += '<div class="ci" style="margin-top:.5rem"><span>Soma dos líquidos</span><span>' + fmt(totalNets) + '</span></div>';
    var isOk = Math.abs(totalRec - totalNets) < 0.02;
    chk += '<div style="margin-top:.6rem;font-size:.9rem" class="' + (isOk ? 'ok' : '') + '">' + (isOk ? '✔ Conferido — os valores batem.' : '⚠ Verifique os valores.') + '</div>';
    document.getElementById('check').innerHTML = chk;

    document.getElementById('input-section').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goBack() {
    document.getElementById('input-section').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Eventos via addEventListener — sem onclick inline
  document.getElementById('btn-add-payer').addEventListener('click', function() { addPayer('', '', ''); });
  document.getElementById('btn-add-part').addEventListener('click',  function() { addParticipant(''); });
  document.getElementById('btn-calc').addEventListener('click',      calculate);
  document.getElementById('btn-back').addEventListener('click',      goBack);
  document.getElementById('btn-print').addEventListener('click',     function() { window.print(); });

  // Dados iniciais
  addPayer('Júlio',  'Cartola',  730.40);
  addPayer('Sílvio', 'Vinhos',  1030.55);
  addParticipant('Beto');
  addParticipant('Marcos');
  addParticipant('José');
  addParticipant('Toninho');

})();
</script>

</body>
</html>
